<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الغياب - م. عادل الشمري</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #006666; }
        body { background-color: #f8f9fa; font-family: sans-serif; padding-bottom: 50px; }
        .header-section { background: var(--primary-color); color: white; padding: 25px 15px; border-radius: 0 0 25px 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .footer-credit { font-size: 0.85rem; margin-top: 5px; opacity: 0.9; }
        .info-bar { background: #e9ecef; color: #006666; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; border-right: 5px solid #006666; font-size: 0.9rem; }
        .card-stats { border: none; border-radius: 15px; background: white; padding: 10px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .table-container { background: white; border-radius: 20px; padding: 10px; margin-top: 20px; }
        .badge-status { padding: 5px 10px; border-radius: 50px; font-weight: bold; font-size: 0.75rem; display: block; text-align: center; }
        .status-safe { background: #e5f9e5; color: #28a745; }      
        .status-low { background: #fff4e5; color: #fd7e14; }       
        .status-high { background: #fff0f0; color: #e44d26; border: 1px solid #ffcccc; } 
        .status-danger { background: #212529; color: #ffffff; }      
        .whatsapp-btn { background: #25D366; color: white; border: none; border-radius: 8px; padding: 5px 12px; }
    </style>
</head>
<body>

<div class="header-section text-center">
    <h2 class="fw-bold">رادار الغياب</h2>
    <p class="mb-1">خاص بمدربي الكليات التقنية</p>
    <div class="footer-credit">من إعداد: م/عادل الشمري</div>
    <div class="container mt-3">
        <input type="file" id="upload" class="form-control shadow-sm" style="border-radius: 12px;" />
    </div>
</div>

<div class="container-fluid mt-4">
    <div id="course_display" class="info-bar text-center" style="display:none;">
        📍 مقرر: <span id="course_name">---</span> | شعبة رقم: <span id="section_num">---</span>
    </div>

    <div id="stats" class="row g-2 mb-4 text-center" style="display:none;">
        <div class="col-3"><div class="card-stats small">إجمالي<br><b id="t_total">0</b></div></div>
        <div class="col-3"><div class="card-stats small text-success">آمن<br><b id="t_safe">0</b></div></div>
        <div class="col-3"><div class="card-stats small text-warning">خطر<br><b id="t_warning">0</b></div></div>
        <div class="col-3"><div class="card-stats small text-danger">حرمان<br><b id="t_danger">0</b></div></div>
    </div>

    <div id="results" class="table-container shadow-sm" style="display:none;">
        <div class="table-responsive">
            <table class="table table-sm table-hover align-middle">
                <thead class="table-light text-nowrap">
                    <tr>
                        <th>المتدرب</th>
                        <th class="text-center">غياب</th>
                        <th>الحالة</th>
                        <th>تواصل</th>
                    </tr>
                </thead>
                <tbody id="data_rows"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.getElementById('upload').addEventListener('change', function(e) {
        if(!e.target.files.length) return;
        const reader = new FileReader();
        reader.readAsArrayBuffer(e.target.files[0]);
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            processRows(json);
        };
    });

    function processRows(rows) {
        const tbody = document.getElementById('data_rows');
        tbody.innerHTML = '';
        let s = { total: 0, safe: 0, warn: 0, dang: 0 };
        
        let courseTitle = rows[0]['اسم المقرر'] || "مقرر غير معروف";
        let sectionTitle = rows[0]['أرقام شعب المقرر'] || "غير محددة";
        
        document.getElementById('course_name').innerText = courseTitle;
        document.getElementById('section_num').innerText = sectionTitle;
        document.getElementById('course_display').style.display = 'block';

        rows.forEach(r => {
            let name = r['اسم المتدرب'] || "---";
            let hours = parseFloat(r['إجمالي ساعات الغياب بدون عذر'] || r['إجمالي ساعات الغياب بعذر وبدون عذر'] || 0);
            let phone = r['رقم الجوال'] || r['جوال'] || "";

            let badge = "آمن"; let cls = "status-safe";
            if (hours >= 4) { badge = "حرمان (4+)"; cls = "status-danger"; s.dang++; }
            else if (hours == 3) { badge = "خطر عالي (3)"; cls = "status-high"; s.warn++; }
            else if (hours == 2) { badge = "خطر بسيط (2)"; cls = "status-low"; s.warn++; }
            else { s.safe++; }
            s.total++;

            tbody.innerHTML += `<tr>
                <td style="font-size: 0.8rem;"><b>${name}</b></td>
                <td class="text-center fw-bold">${hours}</td>
                <td><span class="badge-status ${cls}">${badge}</span></td>
                <td><button class="whatsapp-btn" onclick="sendWA('${phone}','${name}','${hours}','${badge}','${courseTitle}','${sectionTitle}')">💬</button></td>
            </tr>`;
        });

        document.getElementById('t_total').innerText = s.total;
        document.getElementById('t_safe').innerText = s.safe;
        document.getElementById('t_warning').innerText = s.warn;
        document.getElementById('t_danger').innerText = s.dang;
        document.getElementById('stats').style.display = 'flex';
        document.getElementById('results').style.display = 'block';
    }

    function sendWA(p, n, h, b, c, s) {
        let msg = `عزيزي المتدرب: ${n}%0Aنحيطك علماً بأن غيابك في مقرر (${c}) - شعبة (${s}) بلغ (${h}) وحالتك هي (${b}).%0Aيرجى مراجعة مرشدك التدريبي فوراً.`;
        window.open(`https://wa.me/${p}?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
